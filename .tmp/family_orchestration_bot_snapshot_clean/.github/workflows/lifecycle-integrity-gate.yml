name: lifecycle-integrity-gate

on:
  push:
  pull_request:

jobs:
  lifecycle-integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-timeout

      - name: Run lifecycle verification gates
        run: |
          pytest -q tests/test_migration_cleanliness.py tests/test_no_legacy_lifecycle_strings.py tests/test_boundary_enforcement.py tests/test_event_replay_integrity.py tests/test_persistence_roundtrip_integrity.py tests/test_fsm_non_authority.py

      - name: Run full suite integrity gate
        env:
          RUN_FULL_SUITE_INTEGRITY: "1"
        run: |
          pytest -q tests/test_full_suite_integrity.py
