<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Family Household Platform Assistant - Multi-user household orchestration" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HPAL" />
    <link rel="apple-touch-icon" href="/images/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/images/icon-512.png" />
    <title>Family Orchestration Bot - HPAL Control Surface</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for offline support and push notifications
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch((err) => {
            console.error('Service worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
